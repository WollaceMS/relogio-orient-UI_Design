<!DOCTYPE html>
<html lang="pt-BR" class="scroll-smooth">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Relógio Premium - A Precisão Redefinida</title>
    
    <!-- Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&family=JetBrains+Mono:wght@400;700&display=swap" rel="stylesheet">
    
    <!-- Icons -->
    <script src="https://code.iconify.design/iconify-icon/1.0.7/iconify-icon.min.js"></script>
    
    <!-- Tailwind -->
    <script src="https://cdn.tailwindcss.com"></script>
    
    <!-- GSAP & ScrollTrigger -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/ScrollTrigger.min.js"></script>
    
    <!-- Lenis -->
    <script src="https://cdn.jsdelivr.net/gh/studio-freight/lenis@1.0.29/bundled/lenis.min.js"></script>

    <!-- SplitType -->
    <script src="https://unpkg.com/split-type"></script>

    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: {
                        sans: ['Inter', 'sans-serif'],
                        mono: ['JetBrains Mono', 'monospace'],
                    },
                    colors: {
                        base: '#EAEAE5',
                        surface: '#F4F4F0',
                        ink: '#1C1C1C',
                        neutral: {
                            100: '#F5F5F5',
                            200: '#E5E5E5',
                            300: '#D4D4D4',
                            400: '#A3A3A3',
                            500: '#737373',
                            800: '#262626',
                            900: '#171717',
                        },
                        accent: {
                            DEFAULT: '#ccff00',
                            dark: '#A3CC00'
                        }
                    }
                }
            }
        }
    </script>
    <style>
        body {
            background-color: #EAEAE5;
            color: #1C1C1C;
            font-family: 'Inter', sans-serif;
            overflow-x: hidden;
        }

        /* Lenis smooth scrolling styles */
        html.lenis {
            height: auto;
        }
        .lenis.lenis-smooth {
            scroll-behavior: auto;
        }
        .lenis.lenis-smooth [data-lenis-prevent] {
            overscroll-behavior: contain;
        }
        .lenis.lenis-stopped {
            overflow: hidden;
        }
        .lenis.lenis-scrolling iframe {
            pointer-events: none;
        }

        /* Animations */
        .reveal-mask {
            overflow: hidden;
            display: block;
        }
        
        .char {
            transform: translateY(115%);
            transition: transform 0.8s cubic-bezier(0.16, 1, 0.3, 1);
        }

        /* Buttons */
        .btn-primary {
            position: relative;
            overflow: hidden;
            background: #1C1C1C;
            color: white;
            transition: all 0.4s cubic-bezier(0.16, 1, 0.3, 1);
        }
        .btn-primary:hover {
            box-shadow: 0 10px 30px -10px rgba(28,28,28,0.5);
            transform: translateY(-2px);
        }
        
        .btn-secondary {
            position: relative;
            overflow: hidden;
            border: 1px solid rgba(28,28,28,0.2);
            backdrop-filter: blur(10px);
            transition: all 0.4s cubic-bezier(0.16, 1, 0.3, 1);
        }
        .btn-secondary:hover {
            background: white;
            border-color: rgba(28,28,28,0.5);
            transform: translateY(-2px);
        }

        /* Video container mapping for scroll */
        .scroll-container {
            height: 400vh; /* Giving space to scroll for video duration */
        }
        .hero-sticky {
            position: sticky;
            top: 0;
            height: 100vh;
            display: flex;
            align-items: center;
        }

        /* Glassmorphism elements */
        .glass-badge {
            background: rgba(255, 255, 255, 0.4);
            border: 1px solid rgba(0, 0, 0, 0.1);
            backdrop-filter: blur(10px);
        }
    </style>
</head>
<body class="antialiased selection:bg-accent selection:text-ink">

    <!-- Scroll Context -->
    <div class="scroll-container">
        
        <!-- Sticky Hero Section -->
        <div class="hero-sticky overflow-hidden" id="hero">
            
            <div class="max-w-[1400px] w-full mx-auto px-6 grid grid-cols-1 lg:grid-cols-2 h-full items-center gap-12 relative z-10">
                
                <!-- LEFT SIDE: Text Content -->
                <div class="flex flex-col justify-center h-full pt-20 lg:pt-0 max-w-xl left-content">
                    
                    <div class="fade-up mb-6">
                        <span class="glass-badge px-3 py-1.5 rounded-full text-xs font-mono uppercase tracking-widest text-neutral-600 inline-flex items-center gap-2">
                            <span class="w-1.5 h-1.5 rounded-full bg-ink animate-pulse"></span>
                            Edição Limitada
                        </span>
                    </div>

                    <h1 class="text-5xl md:text-6xl lg:text-7xl font-bold tracking-tighter leading-[1.1] text-ink mb-6" id="hero-headline">
                        A precisão redefinida.
                    </h1>
                    
                    <p class="text-lg md:text-xl text-neutral-600 leading-relaxed mb-10 fade-up pr-4 md:pr-0">
                        Engenharia suíça encontra design contemporâneo em um relógio feito para quem exige perfeição, combinando materiais premium com tecnologia de vanguarda.
                    </p>

                    <div class="flex flex-col sm:flex-row items-center gap-4 fade-up">
                        <button class="btn-primary w-full sm:w-auto px-10 py-4 rounded-full text-sm font-medium flex items-center justify-center gap-3 group">
                            Comprar agora
                            <iconify-icon icon="solar:arrow-right-line-duotone" class="text-lg group-hover:translate-x-1 transition-transform"></iconify-icon>
                        </button>
                        
                        <button class="btn-secondary w-full sm:w-auto px-10 py-4 rounded-full text-sm font-medium flex items-center justify-center gap-3 group">
                            Explorar detalhes
                            <iconify-icon icon="solar:play-bold-duotone" class="text-lg group-hover:scale-110 transition-transform"></iconify-icon>
                        </button>
                    </div>

                    <!-- Scroll indicator -->
                    <div class="absolute bottom-12 left-6 fade-up">
                        <div class="flex items-center gap-3 text-xs font-mono uppercase text-neutral-500 tracking-widest">
                            <div class="w-[1px] h-12 bg-neutral-300 relative overflow-hidden">
                                <div class="absolute top-0 left-0 w-full h-1/2 bg-ink scroll-indicator"></div>
                            </div>
                            <span class="rotate-180" style="writing-mode: vertical-rl;">Role para descobrir</span>
                        </div>
                    </div>
                </div>

                <!-- RIGHT SIDE: Video / Visuals -->
                <div class="relative h-[60vh] lg:h-full w-full flex items-center justify-center lg:justify-end right-content">
                    
                    <!-- Decorative background blur -->
                    <div class="absolute top-1/2 left-1/2 -translate-x-1/2 -translate-y-1/2 w-[80%] h-[80%] bg-neutral-200/50 rounded-full blur-[100px] -z-10"></div>
                    
                    <!-- Video Container -->
                    <div class="w-full max-w-lg lg:max-w-xl aspect-[4/5] object-cover rounded-3xl overflow-hidden shadow-2xl relative">
                        <video 
                            id="product-video"
                            class="w-full h-full object-cover scale-[1.05]"
                            muted 
                            playsinline 
                            preload="auto"
                            src="assets/raw_files/video relogio.mp4"
                        >
                            O seu navegador não suporta a visualização deste vídeo.
                        </video>
                        <!-- Top Gradient Overlay for subtle blending -->
                        <div class="absolute inset-0 bg-gradient-to-b from-black/10 via-transparent to-black/20 pointer-events-none"></div>
                    </div>

                    <!-- Floating Metrics -->
                    <div class="absolute right-0 bottom-1/4 translate-x-1/4 fade-up hidden md:flex flex-col gap-6">
                        <div class="glass-badge p-4 rounded-2xl flex flex-col gap-1 shadow-xl">
                            <span class="text-[10px] font-mono uppercase tracking-widest text-neutral-500">Reserva de marcha</span>
                            <span class="text-2xl font-bold tracking-tighter">72h</span>
                        </div>
                        <div class="glass-badge p-4 rounded-2xl flex flex-col gap-1 shadow-xl">
                            <span class="text-[10px] font-mono uppercase tracking-widest text-neutral-500">Resistência ATM</span>
                            <span class="text-2xl font-bold tracking-tighter">100m</span>
                        </div>
                    </div>
                </div>

            </div>
        </div>
        
    </div>

    <!-- Scripts -->
    <script>
        // Lenis Smooth Scroll Initialization
        const lenis = new Lenis({
            duration: 1.2,
            easing: (t) => Math.min(1, 1.001 - Math.pow(2, -10 * t)),
            direction: 'vertical',
            gestureDirection: 'vertical',
            smooth: true,
            mouseMultiplier: 1,
            smoothTouch: false,
            touchMultiplier: 2,
            infinite: false,
        });

        // Sync Lenis with GSAP ScrollTrigger
        lenis.on('scroll', ScrollTrigger.update);

        gsap.ticker.add((time) => {
            lenis.raf(time * 1000);
        });

        gsap.ticker.lagSmoothing(0);

        // Wait for DOM to load
        document.addEventListener('DOMContentLoaded', () => {
            
            // GSAP ScrollTrigger registration
            gsap.registerPlugin(ScrollTrigger);

            const video = document.getElementById('product-video');
            
            // Text Splitting for animated impact
            const headline = new SplitType('#hero-headline', { types: 'lines, words, chars' });
            
            // Hero Entrance Animation Timeline
            const tl = gsap.timeline({ defaults: { ease: 'power4.out' } });

            // Ensure video metadata is loaded before animating video progress
            video.addEventListener('loadedmetadata', function() {
                
                // Video scroll-driven playback
                let scrollAnim = gsap.to(video, {
                    currentTime: video.duration,
                    ease: "none",
                    scrollTrigger: {
                        trigger: ".scroll-container",
                        start: "top top",
                        end: "bottom bottom",
                        scrub: 1, // Smooth scrubbing
                    }
                });

                // Parallax on the video container
                gsap.to(video, {
                    scale: 1,
                    scrollTrigger: {
                        trigger: ".scroll-container",
                        start: "top top",
                        end: "bottom bottom",
                        scrub: true
                    }
                });
            });

            // If video is already cached and loaded metadata
            if (video.readyState >= 1) {
                video.dispatchEvent(new Event('loadedmetadata'));
            }

            // Text Reveal Animation
            gsap.set(headline.chars, { y: '115%' });
            gsap.set('.fade-up', { y: 30, opacity: 0 });

            tl.to(headline.chars, {
                y: '0%',
                duration: 1,
                stagger: 0.02,
                delay: 0.2
            })
            .to('.fade-up', {
                y: 0,
                opacity: 1,
                duration: 1,
                stagger: 0.1,
            }, "-=0.8");

            // Scroll indicator animation
            gsap.to('.scroll-indicator', {
                y: '100%',
                duration: 1.5,
                ease: 'power2.inOut',
                repeat: -1,
                yoyo: true
            });
        });
    </script>
</body>
</html>
