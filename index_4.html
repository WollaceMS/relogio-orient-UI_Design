<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Masterpiece - A Precisão Clássica</title>

    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500&family=Playfair+Display:ital,wght@0,400;0,500;0,600;1,400;1,500&display=swap"
        rel="stylesheet">

    <style>
        body {
            margin: 0;
            padding: 0;
            background: #000;
            color: #fff;
            font-family: 'Inter', sans-serif;
            overflow-x: hidden;
        }

        /* Barra de Rolagem Minimalista Apple Style para navegação visual */
        ::-webkit-scrollbar {
            width: 8px;
        }

        ::-webkit-scrollbar-track {
            background: #000;
        }

        ::-webkit-scrollbar-thumb {
            background: rgba(255, 255, 255, 0.2);
            border-radius: 10px;
        }

        ::-webkit-scrollbar-thumb:hover {
            background: rgba(255, 255, 255, 0.4);
        }

        /* A altura de hero-container dita o tempo do efeito parallax */
        .hero-container {
            position: relative;
            height: 500vh;
            /* Altura extra para permitir rolar todo o video perfeitamente */
        }

        .sticky-wrapper {
            position: sticky;
            top: 0;
            height: 100vh;
            width: 100vw;
            overflow: hidden;
            display: flex;
            align-items: center;
        }

        #bg-video {
            position: absolute;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            object-fit: cover;
            z-index: 1;
            transform: scale(1.15);
            /* Ponto de partida maior para o efeito Parallax */
            will-change: transform;
            opacity: 0.8;
            /* Mais brilho do vídeo base */
        }

        .overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            /* Degrade duplo: Protege o texto e cria cantos cinematográficos */
            background: radial-gradient(circle at center, rgba(0, 0, 0, 0) 0%, rgba(0, 0, 0, 0.6) 100%),
                linear-gradient(180deg, rgba(0, 0, 0, 0.3) 0%, rgba(0, 0, 0, 0.1) 50%, rgba(0, 0, 0, 0.95) 100%);
            z-index: 2;
        }

        .content {
            position: relative;
            z-index: 3;
            width: 100%;
            max-width: 1400px;
            margin: 0 auto;
            padding: 0 5%;
            display: flex;
            flex-direction: column;
            justify-content: center;
        }

        /* Tema Clássico Premium */
        .tagline {
            font-size: 0.75rem;
            font-weight: 500;
            letter-spacing: 0.4em;
            text-transform: uppercase;
            color: #d4af37;
            /* Dourado Clássico */
            margin-bottom: 2.5rem;
            opacity: 0;
            filter: blur(5px);
            transform: translateY(20px);
        }

        /* Lettering Menor e Elegante */
        .headline {
            font-family: 'Playfair Display', serif;
            font-size: clamp(2.5rem, 6vw, 5rem);
            font-weight: 500;
            line-height: 1;
            letter-spacing: -0.01em;

            /* Degradê Ouro Metálico Refinado */
            background: linear-gradient(to right bottom, #ffffff 10%, #fff8e7 40%, #d4af37 70%, #996515 100%);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            margin-bottom: 2.5rem;
            max-width: 1100px;

            opacity: 0;
            filter: blur(20px);
            transform: translateY(80px) scale(0.9);
        }

        .headline em {
            font-family: 'Playfair Display', serif;
            font-style: italic;
            font-weight: 400;
            padding-right: 0.05em;
        }

        .subheadline {
            font-family: 'Inter', sans-serif;
            font-size: clamp(1rem, 1.5vw, 1.25rem);
            font-weight: 300;
            color: #e7e5e4;
            max-width: 500px;
            line-height: 1.8;
            letter-spacing: 0.03em;
            margin-bottom: 4rem;

            opacity: 0;
            filter: blur(10px);
            transform: translateY(30px);
        }

        .buttons-wrapper {
            display: flex;
            gap: 2rem;
            opacity: 0;
            filter: blur(10px);
            transform: translateY(30px);
        }

        .btn {
            padding: 1.2rem 3.5rem;
            font-size: 0.75rem;
            font-weight: 500;
            text-transform: uppercase;
            letter-spacing: 0.25em;
            cursor: pointer;
            transition: all 0.6s cubic-bezier(0.16, 1, 0.3, 1);
            position: relative;
            display: inline-flex;
            justify-content: center;
            align-items: center;
        }

        .btn-primary {
            background: rgba(255, 255, 255, 0.95);
            color: #000;
        }

        .btn-primary:hover {
            background: #fff;
            transform: translateY(-2px);
            box-shadow: 0 10px 40px rgba(255, 255, 255, 0.2);
        }

        .btn-secondary {
            background: transparent;
            color: #d4af37;
            border: 1px solid transparent;
            padding: 1.2rem 0;
        }

        .btn-secondary::after {
            content: '';
            position: absolute;
            bottom: 20%;
            left: 0;
            width: 0%;
            height: 1px;
            background: #d4af37;
            transition: width 0.4s ease;
        }

        .btn-secondary:hover::after {
            width: 100%;
        }

        .scroll-indicator {
            position: absolute;
            bottom: 60px;
            left: 5%;
            display: flex;
            align-items: center;
            gap: 1.5rem;
            opacity: 0;
            z-index: 3;
            color: #a8a29e;
        }

        .scroll-line {
            width: 80px;
            height: 1px;
            background: rgba(255, 255, 255, 0.1);
            position: relative;
            overflow: hidden;
        }

        .scroll-line::after {
            content: '';
            position: absolute;
            top: 0;
            left: -100%;
            width: 100%;
            height: 100%;
            background: #d4af37;
            animation: scroll-anim 2.5s infinite cubic-bezier(0.65, 0, 0.35, 1);
        }

        @keyframes scroll-anim {
            0% {
                left: -100%;
            }

            50% {
                left: 0%;
            }

            100% {
                left: 100%;
            }
        }

        /* --- Navbar Minimalista / Clássica Orient --- */
        .navbar {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            padding: 1.5rem 5%;
            display: flex;
            justify-content: space-between;
            align-items: center;
            z-index: 9999;
            /* Forçado para o topo absoluto */
            transition: all 0.6s cubic-bezier(0.16, 1, 0.3, 1);
            box-sizing: border-box;

            /* Glassmorphism para garantir legibilidade perfeitamente */
            background: rgba(0, 0, 0, 0.25);
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            border-bottom: 1px solid rgba(255, 255, 255, 0.08);
        }

        .navbar.scrolled {
            padding: 1rem 5%;
            background: rgba(0, 0, 0, 0.85);
            backdrop-filter: blur(15px);
            -webkit-backdrop-filter: blur(15px);
            border-bottom: 1px solid rgba(255, 255, 255, 0.1);
        }

        .nav-links {
            display: flex;
            gap: 3rem;
            flex: 1;
        }

        .nav-links.right {
            justify-content: flex-end;
        }

        .nav-link {
            color: #ffffff;
            text-decoration: none;
            font-size: 0.8rem;
            font-weight: 500;
            letter-spacing: 0.25em;
            text-transform: uppercase;
            position: relative;
            transition: color 0.4s ease, opacity 0.4s ease;
            opacity: 1;
            padding-bottom: 0.3rem;
            text-shadow: 0 1px 3px rgba(0, 0, 0, 0.8);
        }

        .nav-link:hover {
            opacity: 1;
            color: #d4af37;
        }

        .nav-link::after {
            content: '';
            position: absolute;
            bottom: 0;
            left: 50%;
            width: 0;
            height: 1px;
            background: #d4af37;
            /* Dourado da paleta premium */
            transition: all 0.4s cubic-bezier(0.16, 1, 0.3, 1);
            transform: translateX(-50%);
        }

        .nav-link:hover::after {
            width: 100%;
        }

        .nav-logo {
            flex: 1;
            display: flex;
            justify-content: center;
            align-items: center;
            cursor: pointer;
        }

        .logo-text {
            font-family: 'Playfair Display', serif;
            font-size: 2.2rem;
            letter-spacing: 0.22em;
            font-weight: 600;
            color: #ffffff;
            text-transform: uppercase;
            display: flex;
            flex-direction: column;
            align-items: center;
            line-height: 1;
            margin-right: -0.22em;
            /* Compensar o tracking */
            text-shadow: 0 2px 5px rgba(0, 0, 0, 0.8);
        }

        .logo-subtext {
            font-family: 'Inter', sans-serif;
            font-size: 0.6rem;
            letter-spacing: 0.55em;
            font-weight: 500;
            color: #d4af37;
            margin-top: 0.6rem;
            margin-right: -0.55em;
            text-shadow: 0 1px 3px rgba(0, 0, 0, 0.8);
        }
    </style>
</head>

<body>

    <nav class="navbar">
        <div class="nav-links">
            <a href="#" class="nav-link">Relógios</a>
            <a href="#" class="nav-link">A Marca</a>
        </div>
        <div class="nav-logo">
            <div class="logo-text">
                ORIENT
                <span class="logo-subtext">JAPAN</span>
            </div>
        </div>
        <div class="nav-links right">
            <a href="#" class="nav-link">Boutiques</a>
            <a href="#" class="nav-link">Contato</a>
        </div>
    </nav>

    <div class="hero-container" id="hero-trigger">
        <div class="sticky-wrapper">

            <!-- Video perfeitamente atrelado ao Scroll do mouse (Apple Style) -->
            <video id="bg-video" muted playsinline preload="auto">
                <source src="assets/raw_files/videor.mp4" type="video/mp4">
            </video>

            <div class="overlay"></div>

            <div class="content">
                <div class="tagline">Geneve, 1884</div>
                <h2 class="headline">A precisão<br><em>redefinida.</em></h2>
                <p class="subheadline">Engenharia primorosa encontra-se com o peso do legado clássico em um dispositivo
                    feito para transcender o próprio tempo.</p>
                <div class="buttons-wrapper">
                    <button class="btn btn-primary">Adquirir Coleção</button>
                    <button class="btn btn-secondary">A História</button>
                </div>
            </div>

            <div class="scroll-indicator">
                <span
                    style="font-size: 0.65rem; font-weight: 500; text-transform: uppercase; letter-spacing: 0.3em;">Discover</span>
                <div class="scroll-line"></div>
            </div>

        </div>
    </div>

    <!-- Próxima Seção (Para habilitar o scroll final do usuário) -->
    <section
        style="height: 100vh; background: #000; position: relative; z-index: 10; display: flex; flex-direction: column; align-items: center; justify-content: center;">
        <p style="color: #d4af37; font-size: 0.75rem; letter-spacing: 0.25em; text-transform: uppercase;">A Jornada
            Continua</p>
    </section>

    <!-- Bibliotecas Externas Otimizadas -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/ScrollTrigger.min.js"></script>

    <script>
        // Core GSAP
        gsap.registerPlugin(ScrollTrigger);

        // Entrada Cinematográfica Clássica
        const tlLoad = gsap.timeline();

        tlLoad.to('.tagline', { opacity: 1, filter: 'blur(0px)', y: 0, duration: 2, ease: 'power3.out', delay: 0.2 })
            .to('.headline', { opacity: 1, filter: 'blur(0px)', y: 0, scale: 1, duration: 2.5, ease: 'power4.out' }, "-=1.5")
            .to('.subheadline', { opacity: 1, filter: 'blur(0px)', y: 0, duration: 2, ease: 'power3.out' }, "-=2.0")
            .to('.buttons-wrapper', { opacity: 1, filter: 'blur(0px)', y: 0, duration: 1.5, ease: 'power3.out' }, "-=1.5")
            .to('.scroll-indicator', { opacity: 1, filter: 'blur(0px)', duration: 2, ease: 'power2.out' }, "-=1.0");

        // Setup do Parallax Fluido + Video Scrubbing
        const video = document.getElementById('bg-video');

        function initVideoScroll() {
            // Sincronizar Vídeo com Scroll (lerp manual)
            let targetTime = 0;
            let currentTime = 0;

            ScrollTrigger.create({
                trigger: "#hero-trigger",
                start: "top top",
                end: "bottom bottom",
                onUpdate: (self) => {
                    // Mapeia o progresso do scroll pro tempo do vídeo
                    targetTime = self.progress * video.duration;
                }
            });

            function updateVideoTime() {
                // Interpolação super suave para não travar o framerate do vídeo
                currentTime += (targetTime - currentTime) * 0.1;

                if (video.duration && Math.abs(targetTime - currentTime) > 0.005) {
                    video.currentTime = currentTime;
                }

                requestAnimationFrame(updateVideoTime);
            }
            requestAnimationFrame(updateVideoTime);

            // Animação Parallax "Zoom-out" do Video de Fundo
            gsap.to(video, {
                scale: 1, // Volta pro tamanho original
                opacity: 0.3, // Escurece no final do scroll
                scrollTrigger: {
                    trigger: "#hero-trigger",
                    start: "top top",
                    end: "bottom bottom",
                    scrub: 1.5
                }
            });
        }

        // Garante que o Scroll só inicie após identificar a duração do vídeo
        if (video.readyState >= 2) {
            initVideoScroll();
        } else {
            video.addEventListener('loadedmetadata', initVideoScroll);
        }

        // Backup plan: Forçar init caso passe de 1 segundo
        setTimeout(() => {
            if (video.duration) {
                initVideoScroll();
            }
        }, 1000);

        // Text Fade-out Dinâmico
        gsap.to('.content', {
            y: -150,
            filter: 'blur(20px)', // Aprofunda o efeito de desfoque
            opacity: 0,
            scrollTrigger: {
                trigger: "#hero-trigger",
                start: "top top",
                end: "center top", // Termina mais cedo, assim o usuário vê perfeitamente a saída
                scrub: 1
            }
        });

        gsap.to('.scroll-indicator', {
            opacity: 0,
            y: 20,
            scrollTrigger: {
                trigger: "#hero-trigger",
                start: "top top",
                end: "+=300",
                scrub: true
            }
        });

        // Entrada e Efeito da Navbar
        gsap.from('.navbar', {
            y: -30,
            opacity: 0,
            duration: 1.5,
            ease: 'power3.out',
            delay: 0.2
        });

        const navbar = document.querySelector('.navbar');
        window.addEventListener('scroll', () => {
            if (window.scrollY > 50) {
                navbar.classList.add('scrolled');
            } else {
                navbar.classList.remove('scrolled');
            }
        });

    </script>
</body>

</html>
