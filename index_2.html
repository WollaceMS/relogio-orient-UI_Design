<!DOCTYPE html>
<html class="scroll-smooth antialiased" lang="pt-BR">

<head>
    <meta charset="utf-8" />
    <meta content="width=device-width, initial-scale=1.0" name="viewport" />
    <title>Premium Watch - A Precisão Redefinida</title>

    <!-- Fontes e Ícones -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&family=JetBrains+Mono:wght@400;700&display=swap" rel="stylesheet">
    <script src="https://code.iconify.design/iconify-icon/1.0.7/iconify-icon.min.js"></script>
    
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: {
                        sans: ['Inter', 'sans-serif'],
                        mono: ['JetBrains Mono', 'monospace'],
                    },
                    colors: {
                        base: '#EAEAE5',
                        surface: '#F4F4F0',
                        ink: '#1C1C1C',
                        neutral: {
                            100: '#F5F5F5',
                            200: '#E5E5E5',
                            300: '#D4D4D4',
                            400: '#A3A3A3',
                            500: '#737373',
                            800: '#262626',
                            900: '#171717',
                        },
                        accent: {
                            DEFAULT: '#ccff00', /* acid glow */
                            dark: '#A3CC00'
                        }
                    }
                }
            }
        }
    </script>

    <!-- Bibliotecas de Animação e Scroll -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/ScrollTrigger.min.js"></script>
    <script src="https://unpkg.com/@studio-freight/lenis@1.0.35/dist/lenis.min.js"></script>

    <style>
        body {
            background-color: #EAEAE5;
            color: #1C1C1C;
            font-family: 'Inter', sans-serif;
            overflow-x: hidden;
        }

        /* Smooth Scroll base (Lenis) */
        html.lenis { height: auto; }
        .lenis.lenis-smooth { scroll-behavior: auto; }
        .lenis.lenis-smooth [data-lenis-prevent] { overscroll-behavior: contain; }
        .lenis.lenis-stopped { overflow: hidden; }
        .lenis.lenis-scrolling iframe { pointer-events: none; }

        /* Padrão de Background do Design System */
        .bg-grid {
            background-size: 30px 30px;
            background-image: linear-gradient(to right, rgba(28, 28, 28, 0.05) 1px, transparent 1px),
                linear-gradient(to bottom, rgba(28, 28, 28, 0.05) 1px, transparent 1px);
        }

        /* Animações de Texto */
        .text-reveal-wrapper {
            overflow: hidden;
            display: inline-block;
            vertical-align: bottom;
            line-height: normal;
        }

        .title-line {
            transform: translateY(110%);
            display: inline-block;
            will-change: transform;
        }

        .fade-up {
            opacity: 0;
            transform: translateY(30px);
            will-change: transform, opacity;
        }

        /* Botões */
        .btn-primary {
            position: relative;
            overflow: hidden;
            background-color: #1C1C1C;
            color: #EAEAE5;
            transition: all 0.4s cubic-bezier(0.16, 1, 0.3, 1);
            transform: translateZ(0); /* Hardware acceleration */
        }
        
        .btn-primary:hover {
            background-color: #ccff00;
            color: #1C1C1C;
            transform: translateY(-2px);
            box-shadow: 0 10px 30px -10px rgba(204, 255, 0, 0.5);
        }

        .btn-primary:active {
            transform: scale(0.96);
        }

        .btn-outline {
            border: 1px solid rgba(28, 28, 28, 0.2);
            transition: all 0.4s cubic-bezier(0.16, 1, 0.3, 1);
            backdrop-filter: blur(10px);
            background-color: transparent;
        }

        .btn-outline:hover {
            background-color: rgba(28, 28, 28, 0.05);
            border-color: #1C1C1C;
        }

        .btn-outline:active {
            transform: scale(0.96);
        }

        /* Layout Scroll-Driven */
        .scroll-track {
            /* Definimos uma altura alta para permitir scroll e controlar o vídeo */
            height: 400vh;
        }

        .sticky-hero {
            position: sticky;
            top: 0;
            height: 100dvh;
            overflow: hidden;
            display: flex;
            align-items: center;
        }

        /* Vidros Premium (Glassmorphism) */
        .video-glass {
            background: rgba(244, 244, 240, 0.4);
            border: 1px solid rgba(255, 255, 255, 0.8);
            backdrop-filter: blur(20px);
            border-radius: 1.5rem;
            padding: 0.5rem;
            box-shadow: 0 30px 60px -15px rgba(0,0,0,0.1);
        }

        @media (min-width: 1024px) {
            .video-glass {
                padding: 1rem;
                border-radius: 2rem;
            }
        }
    </style>
</head>

<body class="bg-grid">

    <!-- Navbar -->
    <header class="fixed top-0 w-full z-50 border-b border-neutral-300 bg-base/80 backdrop-blur-md">
        <div class="max-w-[1400px] mx-auto flex justify-between items-center px-6 py-4">
            <div class="flex items-center gap-2 font-bold tracking-tighter text-xl text-ink">
                <iconify-icon icon="solar:infinity-bold-duotone" class="text-accent-dark text-2xl rotate-90"></iconify-icon>
                <span>SYS.RELÓGIO</span>
            </div>
            <nav class="hidden md:flex gap-8 text-xs font-mono uppercase tracking-widest text-neutral-500">
                <a href="#" class="hover:text-ink transition-colors">Coleção</a>
                <a href="#" class="hover:text-ink transition-colors">Precisão</a>
                <a href="#" class="hover:text-ink transition-colors">Especificações</a>
            </nav>
        </div>
    </header>

    <!-- Container do Webflow - Track para Scroll -->
    <main class="scroll-track" id="main-track">
        
        <!-- Hero Section Pinned -->
        <section class="sticky-hero w-full relative">
            
            <!-- Glow background decorativo p/ profundidade -->
            <div class="absolute inset-0 z-0 bg-gradient-to-r from-base via-base/80 to-transparent w-full h-full lg:w-1/2 pointer-events-none"></div>
            
            <div class="max-w-[1400px] w-full h-full mx-auto px-6 md:px-12 flex flex-col lg:grid lg:grid-cols-12 gap-8 lg:gap-12 items-center relative z-10 pt-[5rem] lg:pt-0 pb-6 lg:pb-0">
                
                <!-- Lado Esquerdo - Conteúdo Textual -->
                <div class="w-full lg:col-span-5 flex flex-col justify-center h-auto lg:h-full hero-content text-ink z-20">
                    
                    <div class="mb-5 overflow-hidden fade-up">
                        <span class="inline-flex items-center gap-2 px-3 py-1.5 bg-white/60 border border-neutral-200 rounded-full text-[10px] font-mono font-bold uppercase tracking-widest shadow-sm backdrop-blur-sm">
                            <span class="w-1.5 h-1.5 rounded-full bg-accent-dark animate-pulse"></span>
                            Engenharia UI/UX
                        </span>
                    </div>

                    <h1 class="text-5xl sm:text-6xl md:text-7xl lg:text-[5.5rem] font-extrabold tracking-tighter leading-[0.9] mb-6">
                        <span class="text-reveal-wrapper"><span class="title-line">A PRECISÃO</span></span><br>
                        <span class="text-reveal-wrapper"><span class="title-line text-neutral-400">REDEFINIDA.</span></span>
                    </h1>

                    <div class="max-w-md mb-8 text-neutral-600 text-base md:text-lg leading-relaxed font-light fade-up">
                        <p>Engenharia suíça encontra design contemporâneo em um relógio feito para quem exige perfeição em cada detalhe.</p>
                    </div>

                    <div class="flex flex-col sm:flex-row items-stretch sm:items-center gap-4 fade-up">
                        <button class="btn-primary px-8 py-4 rounded-full text-sm font-semibold flex justify-center items-center gap-2 group">
                            Comprar Agora
                            <iconify-icon icon="solar:arrow-right-up-linear" class="text-lg group-hover:translate-x-1 group-hover:-translate-y-1 transition-transform"></iconify-icon>
                        </button>
                        <button class="btn-outline px-8 py-4 rounded-full text-sm font-semibold flex justify-center items-center gap-2">
                            Explorar Detalhes
                        </button>
                    </div>

                    <div class="hidden lg:flex mt-20 items-center gap-3 fade-up">
                        <iconify-icon icon="solar:mouse-circle-line-duotone" class="text-3xl text-neutral-400"></iconify-icon>
                        <span class="text-xs font-mono uppercase tracking-widest text-neutral-400">Scroll down p/ descobrir</span>
                    </div>
                </div>

                <!-- Lado Direito - Visual do Produto (Vídeo) -->
                <div class="w-full lg:col-span-7 h-[100%] max-h-[45vh] lg:max-h-full relative flex items-center justify-center video-section z-10 mt-auto lg:mt-0">
                    
                    <!-- Glow Dinâmico atrás do vídeo -->
                    <div class="parallax-glow absolute inset-0 bg-accent/20 blur-[120px] rounded-full mix-blend-multiply opacity-50 z-0"></div>
                    
                    <!-- Container Vidro -->
                    <div class="w-full h-full lg:h-[85%] max-h-[800px] video-glass flex items-center justify-center z-10 relative" id="video-wrapper">
                        
                        <div class="w-full h-full relative overflow-hidden rounded-2xl lg:rounded-[1.5rem] bg-neutral-200">
                            <!-- Sombra Interna sutil para emoldurar -->
                            <div class="absolute inset-0 z-10 pointer-events-none rounded-2xl lg:rounded-[1.5rem] shadow-[inset_0_0_40px_rgba(0,0,0,0.03)] border border-black/5"></div>
                            
                            <video 
                                id="product-video"
                                src="assets/raw_files/video%20relogio.mp4" 
                                class="w-full h-full object-cover"
                                muted 
                                playsinline 
                                preload="auto"
                            ></video>
                        </div>

                    </div>
                    
                </div>
            </div>
        </section>

    </main>

    <!-- Script Principal -->
    <script>
        document.addEventListener('DOMContentLoaded', () => {

            // --- 1. Inicializa Lenis (Smooth Scroll) ---
            const lenis = new Lenis({
                duration: 1.8,
                easing: (t) => Math.min(1, 1.001 - Math.pow(2, -10 * t)), // ease-out quad
                smooth: true,
            });

            // Sincroniza Lenis com o ticker do GSAP
            lenis.on('scroll', ScrollTrigger.update);
            gsap.ticker.add((time) => {
                lenis.raf(time * 1000);
            });
            gsap.ticker.lagSmoothing(0);

            // --- 2. Animações de Entrada (On Load) ---
            gsap.registerPlugin(ScrollTrigger);
            const tl = gsap.timeline();

            // Títulos surgem de baixo para cima
            tl.to('.title-line', {
                y: '0%',
                duration: 1.4,
                stagger: 0.15,
                ease: 'power4.out',
                delay: 0.2
            });

            // Padrões de Fade UP (Subtitulo e Botões)
            tl.to('.fade-up', {
                y: 0,
                opacity: 1,
                duration: 1.2,
                stagger: 0.1,
                ease: 'power3.out'
            }, "-=1");

            // Container do vídeo desliza e faz fade de forma elegante
            tl.fromTo('.video-section', {
                x: 40,
                opacity: 0
            }, {
                x: 0,
                opacity: 1,
                duration: 1.5,
                ease: 'power3.out'
            }, "-=1.4");


            // --- 3. Controle Cinemático do Vídeo por Scroll ---
            const video = document.getElementById('product-video');
            
            function setupScrollInteraction() {
                // ScrollTrigger para controlar o progresso do video
                ScrollTrigger.create({
                    trigger: '#main-track',
                    start: 'top top',
                    end: 'bottom bottom',
                    scrub: 0.5, // Leve delay para suavizar a transição do scroll
                    onUpdate: (self) => {
                        // Mapeia o progresso (0 a 1) p/ o tempo total do vídeo
                        if (video.duration) {
                            video.currentTime = self.progress * video.duration;
                        }
                    }
                });

                // Microinteração sutil: O vídeo aumenta levemente enquanto rola
                gsap.to('#video-wrapper', {
                    scale: 1.02,
                    ease: 'none',
                    scrollTrigger: {
                        trigger: '#main-track',
                        start: 'top top',
                        end: 'bottom bottom',
                        scrub: true
                    }
                });

                // Parallax do brilho (Glow atrás do vídeo)
                gsap.to('.parallax-glow', {
                    scale: 1.3,
                    opacity: 0.8,
                    ease: 'none',
                    scrollTrigger: {
                        trigger: '#main-track',
                        start: 'top top',
                        end: 'bottom bottom',
                        scrub: true
                    }
                });

                // Parallax de saída do texto principal quando o usuário rola a página
                gsap.to('.hero-content', {
                    y: -100,
                    opacity: 0,
                    ease: 'none',
                    scrollTrigger: {
                        trigger: '#main-track',
                        start: '100px top', 
                        end: '50% top',
                        scrub: true
                    }
                });
            }

            // O setup do ScrollTrigger depende do metadata do vídeo estar carregado
            if (video.readyState >= 1) {
                setupScrollInteraction();
            } else {
                video.addEventListener('loadedmetadata', setupScrollInteraction);
            }
        });
    </script>
</body>
</html>
