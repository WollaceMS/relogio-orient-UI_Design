<!DOCTYPE html>
<html lang="pt-BR" class="scroll-smooth">
<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Relógio Premium - Hero Section</title>

    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Iconify para Ícones Modenos -->
    <script src="https://code.iconify.design/iconify-icon/1.0.7/iconify-icon.min.js"></script>
    <!-- Fontes Premium -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&family=JetBrains+Mono:wght@400;700&display=swap" rel="stylesheet">
    
    <!-- Configuração Tailwind alinhada ao Design System -->
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: {
                        sans: ['Inter', 'sans-serif'],
                        mono: ['JetBrains Mono', 'monospace'],
                    },
                    colors: {
                        base: '#EAEAE5',
                        surface: '#F4F4F0',
                        ink: '#1C1C1C',
                        neutral: {
                            100: '#F5F5F5',
                            200: '#E5E5E5',
                            300: '#D4D4D4',
                            400: '#A3A3A3',
                            500: '#737373',
                            800: '#262626',
                            900: '#171717',
                        },
                        accent: {
                            DEFAULT: '#ccff00', /* acid glow */
                            dark: '#A3CC00'
                        }
                    }
                }
            }
        }
    </script>

    <style>
        body {
            background-color: #EAEAE5;
            color: #1C1C1C;
            font-family: 'Inter', sans-serif;
            overflow-x: hidden;
        }

        /* Classe utilitária para SplitType prevenir cortes de letras (descenders/ascenders) */
        .line { overflow: hidden; padding-bottom: 0.1em; }

        /* Background com grid paramétrico técnico e minimalista */
        .bg-grid {
            background-size: 30px 30px;
            background-image: linear-gradient(to right, rgba(28, 28, 28, 0.03) 1px, transparent 1px),
                linear-gradient(to bottom, rgba(28, 28, 28, 0.03) 1px, transparent 1px);
        }

        /* Botão Primário 1 (Glow Beam Hover) do DS */
        .btn-beam {
            position: relative;
            overflow: hidden;
            display: inline-flex;
        }
        .btn-beam-bg {
            position: absolute;
            inset: -2px;
            background: conic-gradient(from 0deg, transparent 0 340deg, #1C1C1C 360deg);
            animation: spin 3s linear infinite;
            opacity: 0;
            transition: opacity 0.4s ease;
            border-radius: inherit;
            z-index: 0;
        }
        .btn-beam:hover .btn-beam-bg {
            opacity: 1;
        }
        .btn-beam-inner {
            background-color: #EAEAE5; /* cor base */
            margin: 1px; /* espessura da borda glowing */
            z-index: 10;
            position: relative;
            border-radius: inherit;
        }
        .btn-beam:hover .btn-beam-inner {
            background-color: #FFFFFF; /* clareia ao focar hover */
        }
        @keyframes spin { 100% { transform: rotate(360deg); } }

        /* Botão Secundário Glass */
        .btn-glass {
            border: 1px solid rgba(28, 28, 28, 0.15);
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(8px);
            transition: all 0.4s cubic-bezier(0.16, 1, 0.3, 1);
            color: #1C1C1C;
        }
        .btn-glass:hover {
            background: rgba(255, 255, 255, 0.8);
            border-color: rgba(28, 28, 28, 0.4);
            transform: translateY(-2px);
            box-shadow: 0 8px 16px rgba(0, 0, 0, 0.06);
        }

        /* Video Container - Mask de Qualidade Premium */
        .video-box-shadow {
            box-shadow: 0 30px 60px rgba(0,0,0,0.12), inset 0 0 0 1px rgba(255,255,255,0.2);
        }
    </style>
</head>

<body class="bg-grid">

    <!-- HERO SECTION PRINCIPAL -->
    <!-- Ele ocupa inicialmente 100vh mas servirá de "gatilho" e será "pinned" no scroll -->
    <section id="hero-section" class="w-full h-screen overflow-hidden bg-base relative flex flex-col">
        <!-- Layout com 2 colunas -->
        <div class="w-full h-full flex flex-col md:flex-row relative z-10">
            
            <!-- LEFT SIDE: Texto do Produto e Ações -->
            <!-- Escondido inicialmente para esperar GSAP -->
            <div id="hero-content" class="flex-1 w-full md:w-1/2 flex flex-col justify-center px-8 md:px-16 lg:px-24 xl:px-32 relative z-20" style="visibility: hidden;">
                <div class="hero-content-wrapper origin-left">
                    
                    <!-- Subhead/Label técnico -->
                    <div class="hero-label mb-6 flex items-center gap-3 text-xs md:text-sm font-mono uppercase tracking-widest text-neutral-500">
                        <span class="w-2 h-2 rounded-full bg-accent-dark animate-pulse"></span>
                        Calibre de Precisão
                    </div>

                    <!-- Titulo Principal -->
                    <h1 class="hero-headline text-5xl md:text-6xl lg:text-7xl xl:text-[5.5rem] font-extrabold tracking-tighter leading-[0.9] text-ink mb-6">
                        A precisão<br/>redefinida.
                    </h1>

                    <!-- Descrição Curta -->
                    <p class="hero-subheadline text-base md:text-lg lg:text-xl text-neutral-600 max-w-sm md:max-w-md font-medium leading-relaxed mb-10">
                        Engenharia suíça encontra design contemporâneo em um relógio feito para quem exige a perfeição absoluta de cada milissegundo.
                    </p>

                    <!-- Botões Customizados Premium -->
                    <div class="flex flex-wrap items-center gap-4">
                        <button class="btn-beam rounded-full p-[1px] hero-btn">
                            <span class="btn-beam-bg rounded-full"></span>
                            <span class="btn-beam-inner flex items-center justify-center gap-3 px-8 py-3.5 rounded-full text-sm font-semibold transition-all group min-w-[180px]">
                                Comprar agora
                                <iconify-icon icon="solar:arrow-right-linear" class="text-xl group-hover:translate-x-1.5 transition-transform duration-300"></iconify-icon>
                            </span>
                        </button>

                        <button class="hero-btn btn-glass px-8 py-3.5 rounded-full text-sm font-semibold flex items-center gap-2 min-w-[140px] justify-center">
                            Explorar
                        </button>
                    </div>
                </div>
            </div>

            <!-- RIGHT SIDE: Visual Layer com Vídeo do Produto -->
            <!-- Escondido inicialmente em conjuto com Content para fade sync -->
            <div id="video-container" class="flex-1 relative w-full md:w-1/2 overflow-hidden flex items-center justify-center p-4 md:p-10 lg:p-16 bg-surface md:border-l border-t md:border-t-0 border-neutral-300 z-10" style="visibility: hidden;">
                <!-- Wrapper do Video para dar elegância de card interativo -->
                <div class="relative w-full h-full rounded-3xl md:rounded-[2.5rem] overflow-hidden video-box-shadow mix-blend-multiply bg-neutral-900 flex items-center justify-center group">
                    
                    <!-- Vídeo sincronizado - attributes restritos a "muted playsinline preload" pois é guiado por ScrollTrigger -->
                    <!-- NOTA IMPORTANTE: Para testes de path local, evite problemas de loading preenchendo src exatamente conforme o sistema de diretórios. -->
                    <video id="hero-video" class="w-full h-full object-cover transform origin-center transition-transform duration-1000 group-hover:scale-105" 
                           muted playsinline preload="auto" 
                           src="assets/raw_files/video%20relogio.mp4"></video>

                </div>
            </div>
            
        </div>
    </section>

    <!-- EXTRA SPACING FOR SCROLLING: Adiciona "chão" e demarca o fim da experiência -->
    <!-- Em um site real aqui seguiriam os demais folds e funcionalidades -->
    <section class="h-screen w-full flex items-center justify-center bg-ink text-neutral-400 font-mono text-sm tracking-widest relative z-0">
        <p>↓ CONTINUAR EXPERIÊNCIA ↓</p>
    </section>

    <!-- CDN LIBS (Importação dos Módulos Core para Animação e Interação Otimizadas) -->
    <!-- GSAP / ScrollTrigger -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/ScrollTrigger.min.js"></script>
    
    <!-- SplitType para Typography Animations -->
    <script src="https://unpkg.com/split-type"></script>
    
    <!-- Lenis Studio Freight para Smooth Scroll Premium -->
    <script src="https://cdn.jsdelivr.net/gh/studio-freight/lenis@1.0.19/bundled/lenis.min.js"></script>

    <!-- LÓGICA DO FRONT-END -->
    <script>
        // Inicializa o ScrollTrigger no core GSAP
        gsap.registerPlugin(ScrollTrigger);

        // ==========================================
        // 1. Lenis Smooth Scroll Setup
        // ==========================================
        const lenis = new Lenis({
            lerp: 0.05, // Suavidade clássica para sites high-end
            smoothWheel: true
        });

        // Sincroniza updates do Lenis com as tick rates do ScrollTrigger
        lenis.on('scroll', ScrollTrigger.update);
        gsap.ticker.add((time) => { lenis.raf(time * 1000); });
        gsap.ticker.lagSmoothing(0, 0);

        // ==========================================
        // 2. Elementos Variáveis e SplitText
        // ==========================================
        const video = document.getElementById('hero-video');
        const contentContainer = document.getElementById('hero-content');
        const videoContainer = document.getElementById('video-container');
        
        // Split Type - Destrói em linhas, palavras e letras perfeitamente
        const titleSplit = new SplitType('.hero-headline', { types: 'lines, words, chars' });

        // ==========================================
        // 3. Função de Load Animation (Hero Entrance)
        // ==========================================
        const initIntroAnimation = () => {
            // Revela a visibilidade dos containers agora que JS ativou
            gsap.set([contentContainer, videoContainer], { visibility: 'visible' });

            // Timeline de entrada com "Custom Easing" simulado pelo power4
            const tl = gsap.timeline({ defaults: { ease: 'power4.out' } });

            tl.fromTo('.hero-label', 
                { y: 30, opacity: 0 }, 
                { y: 0, opacity: 1, duration: 1.2, delay: 0.1 }
            )
            .fromTo(titleSplit.chars, 
                { y: 80, opacity: 0 },
                { y: 0, opacity: 1, duration: 1.4, stagger: 0.015 },
                "-=1.0"
            )
            .fromTo('.hero-subheadline',
                { y: 30, opacity: 0 },
                { y: 0, opacity: 1, duration: 1.2 },
                "-=1.0"
            )
            .fromTo('.hero-btn',
                { y: 30, opacity: 0, scale: 0.95 },
                { y: 0, opacity: 1, scale: 1, duration: 1, stagger: 0.1 },
                "-=0.9"
            )
            .fromTo(videoContainer,
                { opacity: 0, x: 100, filter: 'blur(10px)' },
                { opacity: 1, x: 0, filter: 'blur(0px)', duration: 1.8, ease: 'power3.out'},
                "-=1.6"
            );
        };

        // ==========================================
        // 4. Scroll-Driven Playback e Movimentos
        // ==========================================
        const initScrollAnim = () => {
            // A. Timeline vinculada ao avanço do Scroll
            const stTimeline = gsap.timeline({
                scrollTrigger: {
                    trigger: "#hero-section",
                    start: "top top",
                    end: "+=3000", // Estende a área de scroll virtual permitindo folga extra na UX
                    pin: true,    // Trava (pin) a visualização
                    scrub: 0.5,   // Respostas amortecidas para interpolação suave,
                }
            });

            // Efeito visual sutil de fade out no Wrapper enquanto rola para focar no produto
            stTimeline.to('.hero-content-wrapper', {
                opacity: 0.1,
                y: -40,
                duration: 1,
                ease: 'none'
            }, 0);

            // Ampliação do vídeo (Parallax visual com Scale) leve simulação de macro
            stTimeline.to(video, {
                scale: 1.15,
                duration: 1,
                ease: 'none'
            }, 0);

            // B. Controle do Tempo do Vidéo Absoluto atrelado ao scroll puro (sem timelines atrasadas)
            ScrollTrigger.create({
                trigger: "#hero-section",
                start: "top top",
                end: "+=3000",
                scrub: true, // true (0.01 sec refresh) -> Mantém total correspondência de frame
                onUpdate: (self) => {
                    // Garantir que a metadata está preenchida
                    if (video.duration) {
                        // Calcula o progresso na timeline absoluta e atualiza frame
                        const targetTime = self.progress * video.duration;
                        video.currentTime = targetTime;
                    }
                }
            });
        };

        // ==========================================
        // 5. Inicialização Robusta
        // ==========================================
        // Precisamos ter certeza que conseguiremos ler `video.duration`
        if (video.readyState >= 1) {
            initScrollAnim();
            initIntroAnimation();
        } else {
            // Se o browser ainda não baixou o metadata inicial do video, faz binding no evento.
            video.addEventListener('loadedmetadata', () => {
                initScrollAnim();           
            });
            // O intro inicia independente para evitar percepção de lag
            initIntroAnimation();
        }
    </script>
</body>
</html>
